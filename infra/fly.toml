# Nyx orchestrator (main app server). Scale-to-zero posture (constitution VI).
# The toolchain compile MCP is a SEPARATE private 6PN app (D6) — not defined here.
app = "nyx-orchestrator"
primary_region = "iad"

[build]
  dockerfile = "../apps/server/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"     # scale-to-zero when idle (constitution VI)
  auto_start_machines = true
  min_machines_running = 0

[[services.ports]]
  # COOP/COEP are set by the app per-response (FR-021, incl. the
  # /webcontainer/connect/* unsafe-none carve-out) — not at the proxy.
  handlers = ["http"]

[env]
  NODE_ENV = "production"
