# CI gates per DS-001: lint, format, typecheck, test must pass on every PR.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# This job only reads the repo to run the gates; grant nothing beyond that.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Socket Firewall guards the install/gate toolchain. Pinned to an exact
      # version so CI is reproducible; bump deliberately (npm view sfw version).
      - run: npm i -g sfw@2.0.6
      - run: sfw pnpm install --frozen-lockfile
      - run: sfw pnpm lint
      - run: sfw pnpm format:check
      - run: sfw pnpm typecheck
      - run: sfw pnpm test
